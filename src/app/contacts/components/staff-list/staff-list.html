 <table class="table table-md mt-2 w-full">
  <thead>
    <tr>
      <th>ID</th>
      <th>Nombre Completo</th>
      <th>Ficha</th>
      <th>C.I.</th>
      <th>Cargo</th>
      <th>Fecha Ingreso</th>
    </tr>
  </thead>
  <tbody>
    @for (user of person(); track user.id) {
      <tr>
        <td>{{ user.id }}</td>
        <td>{{ user.name }} {{ user.last_name }}</td>
        <td>{{ user.ci }}</td>
        <td>{{ user.date_in }}</td>
      </tr>
    }
  </tbody>
 </table>
