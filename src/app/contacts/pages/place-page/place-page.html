<h1 class="text-2xl">Por lugar</h1>
<h3 class="text-lg">Seleccione una...</h3>

<section class="flex flex-auto row-auto justify-center gap-2 flex-wrap">
  <div class="flex-col">
    @for (place of places; track place) {
    <button
      class="btn btn-outline m-2 w-[100px]"
      (click)="selectPlace(place)"
      [class.btn-secondary]="place === selectedPlace()"
    >
      {{ place }}
    </button>
    }
  </div>
</section>

<app-search-input
  placeholder="Buscar por departamento (Cargo), nombre o ficha..."
  (value)="query.set($event)"
  [debounceTime]="300"
  [initialValue]="query()"
/>

<app-staff-list
  [person]="filteredUsers()"
  [errorMessage]="usersResource.error()"
  [isEmpty]="filteredUsers().length === 0"
  [isLoading]="usersResource.isLoading()"
/>
