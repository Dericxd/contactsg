<search-input
  placeholder="Buscar por nombre o apellido..."
  (value)="query.set($event)"
  [debounceTime]="500"
  [initialValue]="query()"
/>

<staff-list
  [person]="staffResource.value() ?? []"
  [errorMessage]="staffResource.error()"
  [isEmpty]="staffResource.value()?.length === 0"
  [isLoading]="staffResource.isLoading()"
/>
